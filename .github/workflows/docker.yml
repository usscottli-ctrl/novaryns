name: Build & push Docker image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # 版本号 = 所构建 commit 的提交时间戳(内容版本)。与"何时打包"无关:
      # 同一 commit 重复构建版本不变;更新检查拿它与 GitHub main 最新 commit
      # 时间比对,相等 = 已是最新,不再因打包时刻差异误报"有新版本"。
      - name: Compute build version (commit unix ts)
        run: echo "BUILD_VERSION=$(git log -1 --format=%ct)" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            BUILD_VERSION=${{ env.BUILD_VERSION }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
